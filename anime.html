<!DOCTYPE html>
<html>
<head>
  <title>Episodes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2 id="animeTitle"></h2>

<!-- MP4 / M3U8 PLAYER -->
<video
  id="videoPlayer"
  controls
  style="display:none; width:100%; border-radius:10px;">
</video>

<!-- YOUTUBE PLAYER -->
<iframe
  id="ytPlayer"
  style="display:none; width:100%; height:220px; border-radius:10px;"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>


<div id="episodeList" class="episode"></div>
  
<script>
  const id = localStorage.getItem("animeId");
const anime = animeData.find(a => a.id == id);

document.getElementById("animeTitle").innerText = anime.title;

const player = document.getElementById("player");
const listEp = document.getElementById("episodeList");
const download = document.getElementById("download");

anime.episodes.forEach(ep => {
  const btn = document.createElement("button");
  btn.innerText = ep.name;
  btn.onclick = () => {
    player.src = ep.video;
    download.href = ep.video;
    player.play();
  };
  listEp.appendChild(btn);
});
  
</script>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
